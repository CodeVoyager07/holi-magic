<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Holi Magic 🌸</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ui">
  <h1 id="title">Happy Holi 🌸</h1>

  <div class="subtitle">
    Add your fav holipartner name with the song of choice to send them your wishes — Happy Holi with bhaang wali masti 🤣😁

  <div class="controls">
    <input id="nameInput" placeholder="Enter name..." />

    <button onclick="copyGreeting()">📤 Copy Wish</button>
    

    <label class="upload">
      
      <input type="file" id="songUpload" accept="audio/*">
    </label>
  </div>

  <p id="funnyText"></p>
</div>

<canvas id="holiCanvas"></canvas>


  
<footer class="footer">
  © 2026  — Created by Aryan with ❤️ & 🌸 Holi vibes
